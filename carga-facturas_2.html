<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Facturas Vukit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1e2333;
    --border: rgba(255,255,255,0.08);
    --accent: #4ade80; --accent-dim: rgba(74,222,128,0.12); --accent-border: rgba(74,222,128,0.3);
    --text: #f0f2f5; --muted: #6b7280; --danger: #f87171; --info: #60a5fa;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  header {
    padding:1.5rem 1.25rem 1.25rem;
    display:flex; align-items:center; gap:0.875rem;
    border-bottom:1px solid var(--border);
  }
  .logo {
    width:40px; height:40px; background:var(--accent-dim);
    border:1px solid var(--accent-border); border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;
  }
  header h1 { font-size:17px; font-weight:600; letter-spacing:-0.01em; }
  header p  { font-size:11px; color:var(--muted); margin-top:2px; }

  main { flex:1; display:flex; flex-direction:column; padding:1.5rem 1.25rem; gap:1.25rem; }

  .capture-zone {
    flex:1; min-height:280px;
    background:var(--surface); border:2px dashed var(--border);
    border-radius:20px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1rem;
    cursor:pointer; overflow:hidden; transition:all 0.2s;
    position:relative;
  }
  .capture-zone.has-image { border-style:solid; border-color:var(--accent-border); padding:0; }
  .capture-zone.has-image img { width:100%; height:100%; object-fit:contain; border-radius:18px; display:block; max-height:380px; }
  .capture-icon { font-size:56px; opacity:0.3; line-height:1; }
  .capture-hint { text-align:center; }
  .capture-hint strong { display:block; font-size:16px; font-weight:500; color:var(--text); margin-bottom:4px; }
  .capture-hint span { font-size:13px; color:var(--muted); }
  input[type=file] { display:none; }

  .change-btn {
    position:absolute; bottom:12px; right:12px;
    background:rgba(15,17,23,0.85); border:1px solid var(--border);
    color:var(--muted); font-size:11px; padding:5px 12px;
    border-radius:20px; cursor:pointer; font-family:'DM Sans',sans-serif;
    backdrop-filter:blur(4px);
  }

  .btn {
    width:100%; padding:1.1rem; border-radius:14px;
    font-size:16px; font-weight:600; font-family:'DM Sans',sans-serif;
    cursor:pointer; border:none; display:flex; align-items:center;
    justify-content:center; gap:0.5rem; transition:all 0.15s; flex-shrink:0;
  }
  .btn-primary { background:var(--accent); color:#0a1a0e; }
  .btn-primary:active { transform:scale(0.97); background:#22c55e; }
  .btn-primary:disabled { opacity:0.3; cursor:not-allowed; transform:none; }

  .spinner { width:18px; height:18px; border:2.5px solid rgba(10,26,14,0.2); border-top-color:#0a1a0e; border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .result {
    border-radius:14px; padding:1.1rem 1.25rem;
    display:none; flex-shrink:0;
  }
  .result.visible { display:block; }
  .result.ok   { background:var(--accent-dim); border:1px solid var(--accent-border); }
  .result.err  { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.3); }
  .result.wait { background:rgba(96,165,250,0.08); border:1px solid rgba(96,165,250,0.3); }

  .result-label { font-size:10px; font-weight:600; letter-spacing:0.06em; margin-bottom:6px; }
  .result.ok   .result-label { color:var(--accent); }
  .result.err  .result-label { color:var(--danger); }
  .result.wait .result-label { color:var(--info); }

  .result-msg { font-size:14px; line-height:1.55; }
  .result.ok  .result-msg { color:var(--text); }
  .result.err .result-msg { color:var(--danger); }
  .result.wait .result-msg { color:var(--info); }
  .result-sub { font-size:12px; color:var(--muted); margin-top:4px; }

  .nueva-btn {
    background:transparent; border:1px solid var(--border);
    color:var(--muted); font-size:14px; padding:0.75rem;
    border-radius:12px; cursor:pointer; font-family:'DM Sans',sans-serif;
    width:100%; display:none; flex-shrink:0;
  }
  .nueva-btn.visible { display:block; }

  .toast {
    position:fixed; bottom:1.5rem; left:50%;
    transform:translateX(-50%) translateY(120px);
    background:var(--text); color:var(--bg);
    padding:0.6rem 1.5rem; border-radius:24px;
    font-size:13px; font-weight:500;
    transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap; z-index:100; pointer-events:none;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">🧾</div>
  <div>
    <h1>Facturas Vukit</h1>
    <p>Foto → Claude → Excel OneDrive</p>
  </div>
</header>

<main>
  <div class="capture-zone" id="zone" onclick="triggerFile()">
    <div class="capture-icon" id="icon">📷</div>
    <div class="capture-hint" id="hint">
      <strong>Sacar foto de la factura</strong>
      <span>o tocar para elegir de la galería</span>
    </div>
    <img id="preview" style="display:none"/>
    <button class="change-btn" id="changeBtn" style="display:none" onclick="triggerFile()">Cambiar foto</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment"/>

  <button class="btn btn-primary" id="btnEnviar" disabled onclick="enviar()">
    Enviar al Excel
  </button>

  <div class="result" id="result">
    <div class="result-label" id="resultLabel"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-sub" id="resultSub"></div>
  </div>

  <button class="nueva-btn" id="btnNueva" onclick="resetAll()">+ Cargar otra factura</button>
</main>

<div class="toast" id="toast"></div>

<script>
const WEBHOOK = 'https://hook.us1.make.com/o9k7h5aiqmp4dvksv97kmah83sww71av';
let imageBase64 = null;

function triggerFile() {
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = ev => {
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1400;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      imageBase64 = dataUrl.split(',')[1];

      const preview = document.getElementById('preview');
      preview.src = dataUrl;
      preview.style.display = 'block';
      document.getElementById('icon').style.display = 'none';
      document.getElementById('hint').style.display = 'none';
      document.getElementById('changeBtn').style.display = 'block';
      document.getElementById('zone').classList.add('has-image');
      document.getElementById('btnEnviar').disabled = false;
      hideResult();
      document.getElementById('btnNueva').classList.remove('visible');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function hideResult() {
  const r = document.getElementById('result');
  r.className = 'result';
}

function showResult(type, label, msg, sub) {
  const r = document.getElementById('result');
  r.className = `result visible ${type}`;
  document.getElementById('resultLabel').textContent = label;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub || '';
}

async function enviar() {
  if (!imageBase64) return;

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Procesando...';
  hideResult();
  document.getElementById('btnNueva').classList.remove('visible');
  showResult('wait', 'PROCESANDO', 'Make está leyendo la factura con Claude...', 'Puede tardar 20-30 segundos.');

  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imagen: imageBase64 }),
      mode: 'no-cors'
    });

    showResult('ok', '✓ LISTO', 'Factura enviada correctamente.', 'Revisá tu Excel en OneDrive en unos segundos.');
    document.getElementById('btnNueva').classList.add('visible');
    showToast('✓ Enviado a Excel');

  } catch(err) {
    showResult('err', 'ERROR', err.message, 'Verificá tu conexión e intentá de nuevo.');
    btn.disabled = false;
  }

  btn.innerHTML = 'Enviar al Excel';
}

function resetAll() {
  imageBase64 = null;
  const preview = document.getElementById('preview');
  preview.style.display = 'none'; preview.src = '';
  document.getElementById('icon').style.display = '';
  document.getElementById('hint').style.display = '';
  document.getElementById('changeBtn').style.display = 'none';
  document.getElementById('zone').classList.remove('has-image');
  document.getElementById('btnEnviar').disabled = true;
  document.getElementById('btnEnviar').innerHTML = 'Enviar al Excel';
  document.getElementById('fileInput').value = '';
  hideResult();
  document.getElementById('btnNueva').classList.remove('visible');
}
</script>
</body>
</html>
